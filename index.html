  <!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Доктор Денчик и Андрей Аналитик | Мульт сериал</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header class="hero">
            <div class="container hero-content">
                <div class="hero-buttons">
                    <a href="#episodes" class="btn btn-primary">Смотреть серии</a>
                    <a href="#contacts" class="btn btn-secondary">Контакты</a>
                </div>
            </div>
        </header>
        <section id="welcome" class="welcome">
            <div class="container">
                <img src="welcome.jpg" alt="Welcome" class="welcome-image">

        </section>
        <section id="characters" class="characters">
            <div class="container">
                <h2 class="section-title">Персонажи</h2>
                <div class="characters-grid">
                    <div class="character-card">
                        <img src="Doctor Denchik.jpg" alt="Доктор Денчик" class="character-photo">

                    </div>
                    <div class="character-card">
                        <img src="Andre.jpg" alt="Андре Аналитик" class="character-photo">
                        <h3>Андре Аналитик</h3>
                    </div>
                    <div class="character-card">
                        <img src="Basie.jpg" alt="Бейси" class="character-photo">
                        <h3>Бейси</h3>
                    </div>
                </div>
            </div>
        </section>
        <section id="episodes" class="episodes">
            <div class="container">
                <h2 class="section-title">Серии</h2>
                <div class="episodes-grid">
                    <div class="episode-card"><h4>Серия 1</h4><a href="#" class="episode-link">Смотреть →</a></div>
                    <div class="episode-card"><h4>Серия 2</h4><a href="#" class="episode-link">Смотреть →</a></div>
                    <div class="episode-card"><h4>Серия 3</h4><a href="#" class="episode-link">Смотреть →</a></div>
                    <div class="episode-card"><h4>Серия 4</h4><a href="#" class="episode-link">Смотреть →</a></div>
                    <div class="episode-card"><h4>Серия 5</h4><a href="#" class="episode-link">Смотреть →</a></div>
                    <div class="episode-card"><h4>Серия 6</h4><a href="#" class="episode-link">Смотреть →</a></div>
                    <div class="episode-card"><h4>Серия 7</h4><a href="#" class="episode-link">Смотреть →</a></div>
                </div>
            </div>
        </section>
        <section id="contacts" class="contacts">
            <div class="container">
                <h2 class="section-title">Связаться с нами</h2>
                <div class="contacts-content">
                        <a href="https://www.tiktok.com/@doctordenchic" target="_blank">TikTok</a>
                        <a href="#">YouTube</a>
                    </div>
                </div>
            </div>
        </section>
    </body>
    </html>
